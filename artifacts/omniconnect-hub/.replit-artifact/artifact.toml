kind = "web"
previewPath = "/"
title = "OmniConnect Hub"
version = "1.0.0"
id = "artifacts/omniconnect-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21932

[services.development]
run = "pnpm --filter @workspace/omniconnect-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/omniconnect-hub", "run", "build" ]
publicDir = "artifacts/omniconnect-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21932"
BASE_PATH = "/"
